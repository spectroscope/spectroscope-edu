<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" href="./brand/favicon.svg" type="image/svg+xml" />
    <title>spectroscope · edu</title>
    <script>
      // FOUC guard: apply the saved skin before the bundle paints.
      // Mirrors designPrefs.applyToDom / readSaved — keep the id list in sync.
      // The edu app ships two brand themes (spectroscope | paper); a stored
      // "still" from spectro-web folds forward harmlessly.
      (function () {
        try {
          var raw = localStorage.getItem("spectroscope:design");
          var p = raw ? JSON.parse(raw) : {};
          var ids = ["spectroscope", "paper", "still"];
          var el = document.documentElement;
          el.setAttribute("data-design", ids.indexOf(p.design) >= 0 ? p.design : "paper");
          el.classList.toggle("fx-scroll", typeof p.scroll === "boolean" ? p.scroll : true);
          el.classList.toggle("fx-particles", typeof p.particles === "boolean" ? p.particles : true);
        } catch (e) {
          /* storage blocked — the default brand espresso stands */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
